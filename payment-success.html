<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付款完成 | Fumei Studio</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #fff8f0 0%, #fff0f5 50%, #f5eeff 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    color: #5C3D2E;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(224, 122, 149, 0.15);
    border: 1.5px solid #fce4ec;
    text-align: center;
  }
  .check-circle {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #B5EAD7, #A0D8C0);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: #E07A95;
    margin-bottom: 12px;
  }
  .msg {
    font-size: 0.95rem;
    color: #666;
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .info-box {
    background: linear-gradient(135deg, #fff8fc, #f8f4ff);
    border: 1.5px dashed #f0d8e0;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 24px;
    font-size: 0.85rem;
    color: #764ba2;
    font-weight: 600;
  }
  .back-btn {
    display: inline-block;
    background: linear-gradient(135deg, #F4A7B9, #E07A95);
    color: white;
    padding: 14px 36px;
    border-radius: 50px;
    text-decoration: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    box-shadow: 0 6px 20px rgba(224, 122, 149, 0.35);
    transition: transform 0.15s;
  }
  .back-btn:hover { transform: translateY(-2px); }
  .hint {
    margin-top: 16px;
    font-size: 0.78rem;
    color: #aaa;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check-circle">✓</div>
    <h1>付款完成！</h1>
    <p class="msg">
      感謝你的購買 💕<br>
      點數將於 <strong>30 秒內</strong>入帳。
    </p>
    <div class="info-box">
      💡 若點數未即時更新，請按下方回到首頁後<br>重新整理頁面（或稍候幾秒再試）。
    </div>
    <a href="/" class="back-btn">回到 Fumei Studio</a>
    <p class="hint">如有任何問題，請透過意見回饋告知我們</p>
  </div>
  <script>
    // 自動倒數 3 秒後回首頁（可以取消）
    setTimeout(() => {
      if (confirm('要自動回到首頁嗎？點「確定」立即返回，點「取消」留在此頁')) {
        window.location.href = '/';
      }
    }, 8000);
  </script>
</body>
</html>
